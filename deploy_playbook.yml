- name: Deploy Mkdocs with Ansible
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    # Default environment is staging if not provided
    env: "{{ env | default('staging') }}"

  vars_prompt:
    - name: env
      prompt: "Enter environment name (e.g., staging, prod)"
      private: no
      default: "staging"

  tasks:
    - name: Fail if env contains invalid characters
      ansible.builtin.fail:
        msg: "Environment name must contain only alphanumeric chars, hyphens, or underscores"
      when: env is not regex('^[a-zA-Z0-9_-]+$')

    - name: Set destination directory
      ansible.builtin.set_fact:
        dest_dir: "/opt/mkdocs-{{ env }}"

    - name: Ensure dependencies are installed
      ansible.builtin.package:
        name:
          - docker-ce
        state: present
      ignore_errors: yes
      register: docker_valid

    - name: Include geerlingguy.docker role conditionally
      include_role:
        name: geerlingguy.docker
      when: docker_valid is failed

    - name: Ensure target directory exists and is clean
      ansible.builtin.file:
        path: "{{ dest_dir }}"
        state: absent

    - name: Recreate target directory
      ansible.builtin.file:
        path: "{{ dest_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy current directory contents to destination
      ansible.posix.synchronize:
        src: ./
        dest: "{{ dest_dir }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.gitignore"
          - "--exclude=.vscode"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=.DS_Store"
          - "--exclude=*.log"
          - "--exclude=node_modules/"
          - "--exclude=.env"

    - name: Start services with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ dest_dir }}"
        files: "compose-{{ env }}.yml"
        state: present
        recreate: always
